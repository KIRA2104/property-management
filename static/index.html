<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropManage - Premium Property Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/assets/style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fa-solid fa-building-user"></i>
            PropManage
        </div>
        <div class="nav-controls">
            <div id="userInfo" style="display: none; align-items: center; gap: 1.5rem;">
                <span id="userName" style="color: var(--text); font-weight: 500;"></span>
                <button class="outline" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
            <button id="loginBtnBtn" onclick="openModal('authModal')">
                <i class="fa-solid fa-lock"></i> Login
            </button>
        </div>
    </nav>

    <!-- Login/Register Modal -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="authTitle">Welcome Back</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;" id="authSubtitle">Sign in to manage your properties</p>
            </div>
            
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group" id="emailGroup" style="display: none;">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="owner@example.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••••">
                </div>
                <button type="submit" style="width: 100%; justify-content: center; margin-top: 1rem; padding: 1rem;" id="authSubmitBtn">
                    Sign In
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 500; font-size: 0.95rem;" onclick="toggleAuthMode()" id="authToggle">
                    Don't have an account? Register
                </a>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="container hidden" id="appContainer">
        <div class="dashboard-grid">
            
            <!-- Sidebar -->
            <div class="glass sidebar">
                <button class="tab-btn active" onclick="switchTab('properties')">
                    <i class="fa-solid fa-building"></i> Properties
                </button>
                <button class="tab-btn" onclick="switchTab('tenants')">
                    <i class="fa-solid fa-users"></i> Tenants
                </button>
                <button class="tab-btn" onclick="switchTab('agreements')">
                    <i class="fa-solid fa-file-contract"></i> Agreements
                </button>
                <button class="tab-btn" onclick="switchTab('payments')">
                    <i class="fa-solid fa-money-bill-wave"></i> Payments
                </button>
            </div>

            <!-- Content Area -->
            <div class="glass content-area">
                
                <!-- Properties Tab -->
                <div id="propertiesTab" class="tab-content active">
                    <div class="data-header">
                        <h2>Property Portfolio</h2>
                        <button onclick="openAddProperty()"><i class="fa-solid fa-plus"></i> Add Property</button>
                    </div>
                    <div class="grid-cards" id="propertiesList">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Tenants Tab -->
                <div id="tenantsTab" class="tab-content">
                    <div class="data-header">
                        <h2>Tenants Directory</h2>
                        <button onclick="openAddTenant()"><i class="fa-solid fa-plus"></i> Add Tenant</button>
                    </div>
                    <div class="grid-cards" id="tenantsList">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Agreements Tab -->
                <div id="agreementsTab" class="tab-content">
                    <div class="data-header">
                        <h2>Rental Agreements</h2>
                        <button onclick="openAddAgreement()"><i class="fa-solid fa-plus"></i> New Agreement</button>
                    </div>
                    <div class="grid-cards" id="agreementsList">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Payments Tab -->
                <div id="paymentsTab" class="tab-content">
                    <div class="data-header">
                        <h2>Payment Records</h2>
                        <button onclick="openAddPayment()"><i class="fa-solid fa-plus"></i> Record Payment</button>
                    </div>
                    <div class="grid-cards" id="paymentsList">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Property Create Modal -->
    <div id="propertyModal" class="modal-overlay" onclick="closeModalOutside(event, 'propertyModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Property</h2>
            </div>
            <form onsubmit="createProperty(event)">
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="propAddress" required minlength="5" placeholder="123 Luxury Lane, City">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="propDesc" rows="3" placeholder="A beautiful modern apartment..."></textarea>
                </div>
                <div class="form-group">
                    <label>Monthly Rent (₹)</label>
                    <input type="number" id="propRent" step="0.01" min="1" required placeholder="15000">
                </div>
                <button type="submit" style="width: 100%; justify-content: center; margin-top: 1rem;">Save Property</button>
            </form>
        </div>
    </div>

    <!-- Tenant Create Modal -->
    <div id="tenantModal" class="modal-overlay" onclick="closeModalOutside(event, 'tenantModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Tenant</h2>
            </div>
            <form onsubmit="createTenant(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="tenFirst" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="tenLast" required placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="tenEmail" required placeholder="john.doe@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="tenPhone" placeholder="+91 9876543210">
                </div>
                <button type="submit" style="width: 100%; justify-content: center; margin-top: 1rem;">Save Tenant</button>
            </form>
        </div>
    </div>

    <!-- Agreement Create Modal -->
    <div id="agreementModal" class="modal-overlay" onclick="closeModalOutside(event, 'agreementModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Rental Agreement</h2>
            </div>
            <form onsubmit="createAgreement(event)">
                <div class="form-group">
                    <label>Property</label>
                    <select id="agrProperty" required></select>
                </div>
                <div class="form-group">
                    <label>Tenant</label>
                    <select id="agrTenant" required></select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="agrStart" required>
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="agrEnd" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Agreed Monthly Rent (₹)</label>
                        <input type="number" id="agrRent" step="0.01" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Deposit Amount (₹)</label>
                        <input type="number" id="agrDeposit" step="0.01" min="0" value="0" required>
                    </div>
                </div>
                <button type="submit" style="width: 100%; justify-content: center; margin-top: 1rem;">Save Agreement</button>
            </form>
        </div>
    </div>

    <!-- Payment Create Modal -->
    <div id="paymentModal" class="modal-overlay" onclick="closeModalOutside(event, 'paymentModal')">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Payment</h2>
            </div>
            <form onsubmit="createPayment(event)">
                <div class="form-group">
                    <label>Agreement</label>
                    <select id="payAgreement" required></select>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="payAmount" step="0.01" min="1" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Payment Date</label>
                        <input type="date" id="payDate" required>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="payStatus">
                            <option value="confirmed">Confirmed</option>
                            <option value="pending">Pending</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" style="width: 100%; justify-content: center; margin-top: 1rem;">Record Payment</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="notification"></div>

    <script src="/static/assets/app.js"></script>
</body>
</html>
